<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex-grid</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="header-1">
        <div class="name-menu">
          <div class="name"><h1>Panto</h1></div>
          <div class="menu">
            <ul>
              <li><a href="#">Furmiture</a></li>
              <li><a href="#">Shop</a></li>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </div>
          <div class="bag"><img src="images/Bag.png" alt="gio hang" /></div>
        </div>
        <div class="text-header">
          <h2>Make your interior more <br />minimalistic & modern</h2>
          <p>
            Turn your room with panto into a lot more minimalist <br />
            and modern with ease and speed
          </p>
          <div class="search">
            <input
              type="search"
              name="s"
              id="search-input"
              placeholder="Search Fumiture"
            />
            <button type="submit" id="icon-search">
              <img src="images/icons_search.png" alt="icon-search" />
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
