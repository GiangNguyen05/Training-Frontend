<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photobooth</title>
    <style>
      .booth {
        width: 400px;
        background: #ccc;
        border: 10px solid #ddd;
        margin: 0 auto;
        box-shadow:
          inset 0 2px 4px rgba(0, 0, 0, 0.15),
          0 1px 2px rgba(0, 0, 0, 0.05);
      }
      video {
        width: 100%;
        height: auto;
      }
      canvas {
        display: none;
      } /* Dùng để chụp ảnh ngầm */
      .controls {
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="booth">
      <video id="video" autoplay></video>
      <div class="controls">
        <button id="snap">Chụp ảnh</button>
      </div>
      <canvas id="canvas" width="400" height="300"></canvas>
      <div id="photos"></div>
      <!-- Nơi hiển thị ảnh đã chụp -->
    </div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const snap = document.getElementById("snap");
      const photos = document.getElementById("photos");

      // Yêu cầu quyền truy cập Camera
      navigator.mediaDevices
        .getUserMedia({
          video: { frameRate: { ideal: 30, max: 60 } },
          audio: false,
        })
        .then((stream) => {
          video.srcObject = stream;
        })
        .catch((err) => console.error("Lỗi camera: ", err));
      // Xử lý chụp ảnh
      snap.addEventListener("click", () => {
        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, 400, 300);
        const data = canvas.toDataURL("image/png");

        //kiểm tra data có tồn tại hay không
        if (data) {
          const img = document.createElement("img"); //tạo một thẻ img trong bộ nhớ.
          img.src = data; // Cách viết ngắn gọn thay cho setAttribute
          img.style.width = "100px";
          img.alt = "User photo"; // Nên thêm alt để tốt cho SEO và trợ năng
          photos.appendChild(img); // gắn img vào id photos để hiển thị trên html
        }
        //lấy anh về
        // 1. Tạo một thẻ link ẩn
        const link = document.createElement("a");
        // 2. Gán dữ liệu ảnh (Base64) vào thuộc tính href
        link.href = data;
        // 3. Đặt tên cho file sẽ tải về theo thời gian
        link.download = "photo_" + new Date().getTime() + ".png";
        // 4. Giả lập hành động click để trình duyệt tự tải file
        link.click();
      });

      /**  luông hoạt động
          Người dùng bấm nút "Chụp".
          Hệ thống lấy hình từ Video vẽ sang Canvas.
          Chuyển Canvas thành chuỗi dữ liệu ảnh.
          (Kết hợp với code trước) Tạo thẻ <img> và gán chuỗi dữ liệu đó vào để hiển thị kết quả.
        **/
    </script>
  </body>
</html>
