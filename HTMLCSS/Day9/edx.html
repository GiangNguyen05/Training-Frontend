<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>webcam start/stop</title>
    <script>
      let webcamStream;

      function startWebcam() {
        // request video and audio stream from the user's webcam
        navigator.mediaDevices
          .getUserMedia({
            audio: true,
            video: true,
          })
          .then((stream) => {
            let video = document.querySelector("#video");
            video.srcObject = stream;
            video.play();

            webcamStream = stream;
          })
          .catch((error) => {
            console.log("navigator.getUserMedia error: ", error);
          });
      }

      function stopWebcam() {
        webcamStream.getTracks()[0].stop(); // audio
        webcamStream.getTracks()[1].stop(); // video
      }
    </script>

    <script>
      // step1
      var options = { mimeType: "video/webm; codecs=vp9" }; //nén video bằng định dạng WebM và mã vp9
      mediaRecorder = new MediaRecorder(stream, options); //stream là đối tượng đc trả về
      // step2
      var recordedChunks = []; // khai báo mảng byte đc lưu lại
      mediaRecorder.ondataavailable = handleDataAvailable; //hàm đc gọi khi video đang phát
      mediaRecorder.start(); // dử liệu truyền đến hàm dưới

      function handleDataAvailable(event) {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        } else {
        } //thu thập dử liệu lưu vào mảng trên.
      }
      //step3
      mediaRecorder.stop(); //kêt thúc handleData và dừng thu thập dử liệu
      //step4
      function play() {
        var superBuffer = new Blob(recordedChunks); //tạo blob với mảng recorderdChunks
        videoElement.src = window.URL.createObjectURL(superBuffer); //tạo url gắn cho "src" của video html
        //step5
        function download() {
          var blob = new Blob(recordedChunks, {
            type: "video/webm",
          });
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          document.body.appendChild(a);
          a.style = "display: none";
          a.href = url;
          a.download = "test.webm";
          a.click();
          window.URL.revokeObjectURL(url);
        }
      }
    </script>
  </head>
  <body>
    <video width="400" height="400" id="video" controls></video>
    <p>
      <button onclick="startWebcam()">Start webCam</button>
      <button onclick="stopWebcam()">Stop webCam</button>
    </p>
  </body>
</html>
